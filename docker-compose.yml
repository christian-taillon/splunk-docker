volumes:
  so1-var:
  so1-etc:
  so1-usr:
  so1-sysloc:

services:
  so1:
    image: docker.io/splunk/splunk:10.2.1-rhel9
    container_name: so1
    hostname: so1
    restart: unless-stopped
    environment:
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_GENERAL_TERMS: ${SPLUNK_GENERAL_TERMS}
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      SPLUNK_LICENSE_URI: ${SPLUNK_LICENSE_URI:-Free}
    ports:
      - "0.0.0.0:8000:8000"
      - "0.0.0.0:8088:8088"
      - "0.0.0.0:8089:8089"
      - "0.0.0.0:9997:9997"
    volumes:
      - so1-var:/opt/splunk/var
      - so1-etc:/opt/splunk/etc
      - so1-usr:/opt/splunk/etc/users
      - so1-sysloc:/opt/splunk/etc/system/local
