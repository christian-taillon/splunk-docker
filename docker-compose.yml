volumes:
  splunk-var:
  splunk-etc:

services:
  splunk:
    image: docker.io/splunk/splunk:10.2.1-rhel9
    container_name: splunk
    hostname: splunk
    restart: unless-stopped
    environment:
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_GENERAL_TERMS: ${SPLUNK_GENERAL_TERMS}
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      SPLUNK_LICENSE_URI: ${SPLUNK_LICENSE_URI:-Free}
    ports:
      - "0.0.0.0:8000:8000" # Splunk Web UI
      - "0.0.0.0:8088:8088" # HTTP Event Collector (HEC)
      - "0.0.0.0:8089:8089" # Management API
      - "0.0.0.0:9997:9997" # Forwarder / Indexing Port
    healthcheck:
      test: ["CMD", "/sbin/check_status.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 65536
        hard: 65536
    volumes:
      - splunk-var:/opt/splunk/var
      - splunk-etc:/opt/splunk/etc
